# Nginx configuration for Go Fiber API on a single Plesk/VPS server.
#
# Architecture:
#   Browser          → https://api.alemedu.com  (Nginx:443, SSL terminated)
#   Nginx            → http://127.0.0.1:8081    (Go Fiber, plain HTTP)
#   Next.js SSR      → http://127.0.0.1:8081    (direct, bypasses Nginx)
#
# Place this file at: /etc/nginx/conf.d/api.alemedu.com.conf
# OR add the server blocks via Plesk > api.alemedu.com > Apache & Nginx Settings.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # Go Fiber backend — same-server, plain HTTP, no SSL overhead
    upstream fiber_api {
        server 127.0.0.1:8081;
        keepalive 32;
    }

    # -------------------------------------------------------
    # HTTP → HTTPS redirect
    # -------------------------------------------------------
    server {
        listen 80;
        server_name api.alemedu.com;
        return 301 https://$server_name$request_uri;
    }

    # -------------------------------------------------------
    # HTTPS — api.alemedu.com  (SSL terminated by Nginx/Plesk)
    # -------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name api.alemedu.com;

        # Managed by Plesk / Let's Encrypt — update paths if different
        ssl_certificate     /etc/letsencrypt/live/api.alemedu.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.alemedu.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        client_max_body_size 100M;
        client_body_timeout 60s;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Static uploads served directly by Nginx (faster, no Go overhead)
        location /storage/ {
            alias /var/www/vhosts/alemedu.com/httpdocs/storage/app/public/;
            expires 365d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Health check (no rate limit)
        location = /api/ping {
            proxy_pass http://fiber_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Auth endpoints (strict rate limit)
        location ~ ^/api/auth/(login|register) {
            limit_req zone=auth burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://fiber_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # All other API endpoints
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_req_status 429;

            proxy_pass http://fiber_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
