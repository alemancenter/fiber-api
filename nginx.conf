# =============================================================================
# Nginx Configuration — alemancenter.com
# =============================================================================
# Frontend  : Next.js on 127.0.0.1:3000
# Backend   : Go Fiber on 127.0.0.1:8081
#
# Deploy:
#   mkdir -p /var/cache/nginx/alemancenter && chown www-data:www-data /var/cache/nginx/alemancenter
#   cp nginx.conf /etc/nginx/sites-available/alemancenter.com
#   ln -sf /etc/nginx/sites-available/alemancenter.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# =============================================================================

# ── Frontend page-cache zone ──────────────────────────────────────────────────
# Caches Next.js ISR/public pages (Cache-Control: public, s-maxage=N).
# Before first deploy, run:
#   mkdir -p /var/cache/nginx/alemancenter && chown www-data:www-data /var/cache/nginx/alemancenter
proxy_cache_path /var/cache/nginx/alemancenter
                 levels=1:2
                 keys_zone=alemancenter_cache:10m
                 max_size=500m
                 inactive=10m
                 use_temp_path=off;

# ── Upstream servers ─────────────────────────────────────────────────────────
upstream frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream backend {
    server 127.0.0.1:8081;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name alemancenter.com www.alemancenter.com api.alemancenter.com;
    return 301 https://$host$request_uri;
}

# =============================================================================
# Frontend — alemancenter.com
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alemancenter.com www.alemancenter.com;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/alemancenter.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alemancenter.com/privkey.pem;
    ssl_protocols            TLSv1.2 TLSv1.3;
    ssl_ciphers              ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache        shared:SSL:10m;
    ssl_session_timeout      10m;
    ssl_session_tickets      off;
    ssl_stapling             on;
    ssl_stapling_verify      on;
    resolver                 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout         5s;
    server_tokens            off;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;

    # ── Static assets (Next.js _next/static) — long cache ───────────────────
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── All other frontend requests ──────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
        proxy_hide_header  X-Powered-By;

        # ── Proxy page cache (ISR pages only) ────────────────────────────────
        # Next.js sets Cache-Control: public, s-maxage=N for ISR pages.
        # force-dynamic pages return no-store — Nginx will not cache them.
        # Authenticated users (cookie: token) always bypass the cache.
        proxy_cache            alemancenter_cache;
        proxy_cache_lock       on;
        proxy_cache_key        "$scheme$request_method$host$request_uri";
        proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_bypass     $cookie_token $cookie_refresh_token;
        proxy_no_cache         $cookie_token $cookie_refresh_token;
        add_header             X-Cache-Status $upstream_cache_status always;
    }
}

# =============================================================================
# Backend API — api.alemancenter.com
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.alemancenter.com;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.alemancenter.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.alemancenter.com/privkey.pem;
    ssl_protocols            TLSv1.2 TLSv1.3;
    ssl_ciphers              ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache        shared:SSL:10m;
    ssl_session_timeout      10m;
    ssl_session_tickets      off;
    ssl_stapling             on;
    ssl_stapling_verify      on;
    resolver                 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout         5s;
    server_tokens            off;

    # ── Security ─────────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;

    # ── CORS safety net — added on ALL responses including 4xx/5xx ──────────
    # These duplicate what Go Fiber adds, but ensure CORS headers are present
    # even when Nginx itself returns an error (502, 504, etc.) before the
    # request reaches Go Fiber.
    set $cors_origin "";
    if ($http_origin = "https://alemancenter.com") {
        set $cors_origin "https://alemancenter.com";
    }
    add_header Access-Control-Allow-Origin      $cors_origin   always;
    add_header Access-Control-Allow-Credentials "true"         always;
    add_header Access-Control-Allow-Methods     "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Origin,Content-Type,Accept,Authorization,X-Requested-With,X-Frontend-Key,X-Country-Id,X-Country-Code,X-App-Locale,X-CSRF-Token,Cache-Control" always;

    # ── OPTIONS preflight — handled by Nginx directly (no backend hit) ───────
    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;
            add_header Access-Control-Allow-Methods     "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Origin,Content-Type,Accept,Authorization,X-Requested-With,X-Frontend-Key,X-Country-Id,X-Country-Code,X-App-Locale,X-CSRF-Token,Cache-Control" always;
            add_header Access-Control-Max-Age           86400        always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection         "";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering    off;
    }

    # ── AI generation — model inference can take up to 90s ──────────────────
    location ~ ^/api/ai/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;
            add_header Access-Control-Allow-Methods     "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Origin,Content-Type,Accept,Authorization,X-Requested-With,X-Frontend-Key,X-Country-Id,X-Country-Code,X-App-Locale,X-CSRF-Token,Cache-Control" always;
            add_header Access-Control-Max-Age           86400        always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection         "";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        proxy_buffering    off;
    }

    # ── SMTP test endpoints — longer timeout (backend times out in 20s) ──────
    location ~ ^/api/dashboard/settings/smtp/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;
            add_header Access-Control-Allow-Methods     "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Origin,Content-Type,Accept,Authorization,X-Requested-With,X-Frontend-Key,X-Country-Id,X-Country-Code,X-App-Locale,X-CSRF-Token,Cache-Control" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection         "";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering    off;
    }

    # ── File upload endpoints — larger body size ──────────────────────────────
    location ~ ^/api/dashboard/settings$ {
        client_max_body_size 10m;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection         "";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 30s;
        proxy_buffering    off;
    }

    # ── Storage (public files) ────────────────────────────────────────────────
    location /storage/ {
        alias /var/www/vhosts/alemancenter.com/httpdocs/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }
}
