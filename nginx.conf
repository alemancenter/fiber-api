# =============================================================================
# Nginx Configuration — alemedu.com
# =============================================================================
# Frontend  : Next.js on 127.0.0.1:3000
# Backend   : Go Fiber on 127.0.0.1:8081
#
# Deploy:
#   cp nginx.conf /etc/nginx/sites-available/alemedu.com
#   ln -sf /etc/nginx/sites-available/alemedu.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
# =============================================================================

# ── Upstream servers ─────────────────────────────────────────────────────────
upstream frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream backend {
    server 127.0.0.1:8081;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name alemedu.com www.alemedu.com api.alemedu.com;
    return 301 https://$host$request_uri;
}

# =============================================================================
# Frontend — alemedu.com
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alemedu.com www.alemedu.com;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/alemedu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alemedu.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;

    # ── Static assets (Next.js _next/static) — long cache ───────────────────
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── All other frontend requests ──────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }
}

# =============================================================================
# Backend API — api.alemedu.com
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.alemedu.com;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.alemedu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.alemedu.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security ─────────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;

    # ── CORS safety net — added on ALL responses including 4xx/5xx ──────────
    # These duplicate what Go Fiber adds, but ensure CORS headers are present
    # even when Nginx itself returns an error (502, 504, etc.) before the
    # request reaches Go Fiber.
    set $cors_origin "";
    if ($http_origin = "https://alemedu.com") {
        set $cors_origin "https://alemedu.com";
    }
    add_header Access-Control-Allow-Origin      $cors_origin   always;
    add_header Access-Control-Allow-Credentials "true"         always;
    add_header Access-Control-Allow-Methods     "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Origin,Content-Type,Accept,Authorization,X-Requested-With,X-Frontend-Key,X-Country-Id,X-Country-Code,X-App-Locale,X-CSRF-Token,Cache-Control" always;

    # ── OPTIONS preflight — handled by Nginx directly (no backend hit) ───────
    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;
            add_header Access-Control-Allow-Methods     "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Origin,Content-Type,Accept,Authorization,X-Requested-With,X-Frontend-Key,X-Country-Id,X-Country-Code,X-App-Locale,X-CSRF-Token,Cache-Control" always;
            add_header Access-Control-Max-Age           86400        always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection         "";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering    off;
    }

    # ── SMTP test endpoints — longer timeout (backend times out in 20s) ──────
    # The Go backend enforces a 20s SMTP connection timeout so it always
    # responds before Nginx's 30s limit. This block exists as a safety margin.
    location ~ ^/api/dashboard/settings/smtp/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;
            add_header Access-Control-Allow-Methods     "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Origin,Content-Type,Accept,Authorization,X-Requested-With,X-Frontend-Key,X-Country-Id,X-Country-Code,X-App-Locale,X-CSRF-Token,Cache-Control" always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection         "";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 30s;  # backend SMTP timeout = 20s, so 30s is safe
        proxy_send_timeout 30s;
        proxy_buffering    off;
    }

    # ── File upload endpoints — larger body size ──────────────────────────────
    location ~ ^/api/dashboard/settings$ {
        client_max_body_size 10m;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection         "";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 30s;
        proxy_buffering    off;
    }

    # ── Storage (public files) ────────────────────────────────────────────────
    location /storage/ {
        alias /var/www/vhosts/alemedu.com/httpdocs/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }
}
