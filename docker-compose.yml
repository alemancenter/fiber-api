version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alemancenter-fiber-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      mysql-jo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alemancenter
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql-jo:
    image: mysql:8.0
    container_name: alemancenter-mysql-jo
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootpass}
      MYSQL_DATABASE: ${DB_NAME_JO:-alhurani_jo}
      MYSQL_USER: ${DB_USER_JO:-dbuser}
      MYSQL_PASSWORD: ${DB_PASS_JO:-dbpass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_jo_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - alemancenter
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: alemancenter-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - alemancenter
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: alemancenter-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./storage/uploads:/var/www/uploads:ro
    depends_on:
      - api
    networks:
      - alemancenter

volumes:
  mysql_jo_data:
  redis_data:

networks:
  alemancenter:
    driver: bridge
