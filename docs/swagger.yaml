host: api.alemedu.com
info:
  contact:
    email: support@alemedu.com
    name: API Support
  description: Backend API for Alemancenter Educational Platform.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Alemancenter API
  version: 2.0.0
paths:
  /ai/generate:
    post:
      consumes:
      - application/json
      description: Generate article content automatically using AI based on a provided
        title
      parameters:
      - description: Prompt payload containing title
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handlers_ai.GenerateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_alemancenter_fiber-api_internal_utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alemancenter_fiber-api_internal_utils.APIResponse'
      security:
      - BearerAuth: []
      - FrontendKeyAuth: []
      summary: AI Content Generation
      tags:
      - AI
  /articles:
    get:
      description: Returns a paginated list of active/published articles
      parameters:
      - description: Country ID
        in: header
        name: X-Country-Id
        type: string
      - description: Filter by grade level
        in: query
        name: grade_level
        type: string
      - description: Filter by subject ID
        in: query
        name: subject_id
        type: integer
      - description: Filter by semester ID
        in: query
        name: semester_id
        type: integer
      - description: Search query
        in: query
        name: search
        type: string
      - description: Filter by file category (e.g. worksheet, exam)
        in: query
        name: file_category
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_alemancenter_fiber-api_internal_utils.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_alemancenter_fiber-api_internal_models.Article'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alemancenter_fiber-api_internal_utils.APIResponse'
      summary: List Public Articles
      tags:
      - Articles
  /articles/{id}:
    get:
      description: Get a single published article by ID
      parameters:
      - description: Country ID
        in: header
        name: X-Country-Id
        type: string
      - description: Article ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_alemancenter_fiber-api_internal_utils.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_alemancenter_fiber-api_internal_models.Article'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_alemancenter_fiber-api_internal_utils.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_alemancenter_fiber-api_internal_utils.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alemancenter_fiber-api_internal_utils.APIResponse'
      summary: Get Article
      tags:
      - Articles
  /articles/by-class/{grade_level}:
    get:
      description: Returns a paginated list of published articles for a specific grade
        level
      parameters:
      - description: Country ID
        in: header
        name: X-Country-Id
        type: string
      - description: Grade Level
        in: path
        name: grade_level
        required: true
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_alemancenter_fiber-api_internal_utils.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_alemancenter_fiber-api_internal_models.Article'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alemancenter_fiber-api_internal_utils.APIResponse'
      summary: List Articles by Grade Level
      tags:
      - Articles
  /articles/by-keyword/{keyword}:
    get:
      description: Returns a paginated list of published articles containing a specific
        keyword
      parameters:
      - description: Country ID
        in: header
        name: X-Country-Id
