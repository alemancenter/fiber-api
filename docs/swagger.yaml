            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_alemancenter_fiber-api_internal_models.Article'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_alemancenter_fiber-api_internal_utils.APIResponse'
      summary: List Articles by Keyword
      tags:
      - Articles
  /articles/download:
    get:
      description: Serves the actual file binary if the provided download token is
